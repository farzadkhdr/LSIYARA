<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>جەژنت پیرۆز 💖 ئاوات</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0b0b 0%, #2d1a1a 40%, #4a2323 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Nizar', 'Rabar', 'Tahoma', sans-serif;
      padding: 20px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* ڕازاندنەوەی پێکەوە */
    .hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      color: rgba(255, 180, 180, 0.25);
      font-size: 28px;
      user-select: none;
      animation: floatUp 7s infinite ease-in;
      opacity: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0.8);
        opacity: 0.7;
      }
      50% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-10vh) rotate(30deg) scale(1.4);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(20, 8, 8, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(220, 160, 140, 0.45);
      border-radius: 48px;
      padding: 35px 30px 45px;
      max-width: 750px;
      width: 100%;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7), 0 0 50px rgba(210, 120, 100, 0.4);
      text-align: center;
      color: #fbe9e7;
      transition: all 0.4s ease;
    }

    /* کۆنترۆڵی موزیک */
    .music-control {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .music-btn {
      background: rgba(255, 180, 160, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 160, 140, 0.6);
      color: #ffe0d5;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .music-btn:hover {
      background: rgba(200, 110, 90, 0.5);
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(210, 100, 80, 0.6);
    }

    .volume-slider {
      width: 80px;
      accent-color: #e07b6b;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
    }

    .message-area {
      font-size: 1.7rem;
      line-height: 2.5rem;
      min-height: 180px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #ffd9cc;
      text-shadow: 0 0 12px #b34b3a;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 30px;
      border-bottom: 1px dashed #c97b6b;
      padding-bottom: 25px;
      transition: all 0.2s;
      margin-top: 20px;
    }

    .special-dedication {
      font-size: 2.6rem;
      font-weight: 700;
      margin-top: 25px;
      color: #ffb7a7;
      text-shadow: 0 0 20px #e65c4b, 0 0 40px #b52e1b;
      background: linear-gradient(to right, #ffd6cc, #ffaa8c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glowPulse 2.2s infinite alternate;
      letter-spacing: 1px;
      line-height: 3.4rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.2s ease, transform 1s ease;
    }

    .special-dedication.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes glowPulse {
      0% {
        text-shadow: 0 0 15px #c0452f, 0 0 35px #a1301f;
      }
      100% {
        text-shadow: 0 0 30px #ff7b5c, 0 0 65px #e6391e;
      }
    }

    .cursor {
      display: inline-block;
      width: 3px;
      background: #ffb09c;
      margin-right: 4px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      height: 1.5em;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .reset-btn {
      background: rgba(255, 230, 220, 0.2);
      border: 1px solid #d69b8b;
      color: #ffeae3;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1.2rem;
      margin-top: 20px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      background: rgba(190, 100, 80, 0.5);
      border-color: #fca18d;
      box-shadow: 0 0 25px #d94e3b;
      color: white;
    }

    @media (max-width: 500px) {
      .message-area {
        font-size: 1.3rem;
        line-height: 2rem;
      }
      .special-dedication {
        font-size: 1.9rem;
      }
      .music-control {
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- دڵەکانی باکگراوند بۆ ئاشقانەبوون -->
  <div class="hearts-container" id="heartsContainer"></div>

  <!-- یوتیوب پلەیەری شاراوە بۆ گۆرانی -->
  <div id="youtube-player" style="position: fixed; bottom: -200px; left: -200px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

  <div class="card">
    <!-- کۆنترۆڵی موزیک -->
    <div class="music-control">
      <button class="music-btn" id="musicToggle" title="ڕاگرتن/دەستپێکردنی گۆرانی">🔊</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="35" title="ڕێکخستنی دەنگ">
    </div>

    <div class="message-area" id="typedMessage">
      <span id="textContainer"></span><span class="cursor" id="cursorSpan"></span>
    </div>

    <!-- دەقی تایبەت کە دوای تەواوبوون دەردەکەوێت -->
    <div class="special-dedication" id="specialText">
      دکتۆرە ئاوات ئەلماسی خاوێن و خاون دلێکی پاک و میهرەبان
    </div>

    <button class="reset-btn" id="replayBtn">🔄 دووبارە بینینەوەی نامەکە</button>
  </div>

  <script>
    (function() {
      // نامە ڕاستەقینەکەت
      const fullMessage = "چەژنت پیرۆز  ئاوات جیان یارەبی خوای گەورە لۆمنت سەلامەت بکات پشت پەنام هەموو دەمێ لە پشتم بووی خۆشی و ناخۆشی منت بەرێ کردن ئەمنت پێ گەیاند هەتا ئیستا وەک مامۆستا سەیری کەسم نەکردیە بەڵام یەکەم مامۆستای ژیانم ئەتوو بووی فێرە زۆر شتت کردم رەبی خوای گەورە ئاواتی دڵت بینتە دی کەسەکی باشیشت بە نسیب بی فەرۆ هەموو دەمێ لۆتو هەیە قەت قەت لۆ هیچ شتەک دەستبەردارت نابی چەژنت پیرۆز بی هەموو ساڵت جەژن بی کەسەکی گەورەی وەکی توو دەبی فەرشی سۆرم لۆ راخستبا لەوانیە ئەو ژیانە زۆر دەرفەتی نەدابمێ زۆر شت هەیە بکەم لۆت بەڵام بە خوای گەورە کەسەکی لەناو دڵی من چەقیوی پشت پەنام جەژنت پیرۆز جەرگ و دڵی فەرزادی";
      
      const textContainer = document.getElementById('textContainer');
      const cursorSpan = document.getElementById('cursorSpan');
      const specialElement = document.getElementById('specialText');
      const replayBtn = document.getElementById('replayBtn');
      const musicToggle = document.getElementById('musicToggle');
      const volumeSlider = document.getElementById('volumeSlider');

      let typingInterval = null;
      let currentIndex = 0;
      let animationActive = false;

      // =============== سیستەمی گۆرانی یوتیوب ===============
      let youtubePlayer = null;
      let isPlayerReady = false;
      let playerPlayInterval = null;
      
      // ئەم فەنکشنە یوتیوب ئەی پی ئای بار دەکات
      function loadYouTubeAPI() {
        // ئەگەر پێشتر بارکرابوو
        if (window.YT && window.YT.Player) {
          createYouTubePlayer();
          return;
        }
        
        // بارکردنی سکریپتی یوتیوب
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        // فەنکشنی گشتی کە یوتیوب بانگی دەکات
        window.onYouTubeIframeAPIReady = function() {
          createYouTubePlayer();
        };
      }

      function createYouTubePlayer() {
        if (youtubePlayer) return;
        
        try {
          youtubePlayer = new YT.Player('youtube-player', {
            videoId: 'RPKTPGuij-Q', // ئای دی ڤیدیۆکەت
            playerVars: {
              autoplay: 1,        // خۆکارانە دەستپێبکات
              controls: 0,        // کۆنترۆڵەکان شاراوە بن
              loop: 1,            // لووپ بکات
              playlist: 'RPKTPGuij-Q', // بۆ لووپ پێویستە
              modestbranding: 1,
              showinfo: 0,
              rel: 0,
              fs: 0,
              playsinline: 1,
              mute: 0             // بێ دەنگ نەبێت
            },
            events: {
              onReady: onPlayerReady,
              onStateChange: onPlayerStateChange,
              onError: onPlayerError
            }
          });
        } catch(e) {
          console.log('یوتیوب پلەیەر دروست نەبوو:', e);
          // هەوڵدانەوە دوای 2 چرکە
          setTimeout(loadYouTubeAPI, 2000);
        }
      }

      function onPlayerReady(event) {
        console.log('✅ یوتیوب پلەیەر ئامادەیە');
        isPlayerReady = true;
        
        // ڕێکخستنی ڤۆڵیوم
        event.target.setVolume(volumeSlider.value);
        
        // دڵنیابوون لەوەی گۆرانییەکە دەستی پێکردووە
        if (event.target.getPlayerState() !== 1) {
          event.target.playVideo();
        }
        
        // چاودێریکردنی پلەیەر بۆ ئەوەی هەر کات ڕاوەستا، دووبارە دەستی پێبکات
        if (playerPlayInterval) clearInterval(playerPlayInterval);
        playerPlayInterval = setInterval(() => {
          try {
            if (youtubePlayer && isPlayerReady && youtubePlayer.getPlayerState) {
              const state = youtubePlayer.getPlayerState();
              // ئەگەر ڕاوەستا (-1, 0, 2, 3, 5) جگە لە 1 (پلەی)
              if (state !== 1 && state !== 3) { // 3 = بەفەری
                youtubePlayer.playVideo();
              }
            }
          } catch(e) {}
        }, 3000);
      }

      function onPlayerStateChange(event) {
        // ئەگەر گۆرانییەکە تەواو بوو (0) یان ڕاوەستا (2)
        if (event.data === 0 || event.data === 2) {
          setTimeout(() => {
            if (youtubePlayer && isPlayerReady) {
              youtubePlayer.playVideo();
            }
          }, 500);
        }
        
        // نوێکردنەوەی ئایکۆنی دوگمە
        if (event.data === 1) { // پلەی
          musicToggle.textContent = '🔊';
        } else {
          musicToggle.textContent = '🎵';
        }
      }

      function onPlayerError(event) {
        console.log('❌ هەڵەی یوتیوب:', event.data);
        // هەوڵدانەوە
        setTimeout(() => {
          if (youtubePlayer) {
            youtubePlayer.playVideo();
          }
        }, 3000);
      }

      function toggleMusic() {
        if (!youtubePlayer || !isPlayerReady) {
          // ئەگەر هێشتا پلەیەر ئامادە نییە، هەوڵی دروستکردنی بدە
          loadYouTubeAPI();
          return;
        }
        
        try {
          const state = youtubePlayer.getPlayerState();
          if (state === 1) { // ئەگەر لە پلەیە
            youtubePlayer.pauseVideo();
            musicToggle.textContent = '🎵';
          } else {
            youtubePlayer.playVideo();
            musicToggle.textContent = '🔊';
          }
        } catch(e) {
          console.log('نەتوانرا گۆرانی کۆنترۆڵ بکرێت');
        }
      }

      // کۆنترۆڵی ڤۆڵیوم
      volumeSlider.addEventListener('input', (e) => {
        const volume = e.target.value;
        if (youtubePlayer && isPlayerReady) {
          try {
            youtubePlayer.setVolume(volume);
          } catch(e) {}
        }
      });

      musicToggle.addEventListener('click', toggleMusic);

      // =============== سیستەمی دڵەکان ===============
      function createHearts() {
        const container = document.getElementById('heartsContainer');
        container.innerHTML = '';
        const symbols = ['❤️', '🌸', '✨', '💖', '🌙', '🕊️', '💕', '🌹', '💝', '🎀', '🫶', '💗'];
        for (let i = 0; i < 35; i++) {
          const heart = document.createElement('span');
          heart.className = 'heart';
          heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDelay = Math.random() * 8 + 's';
          heart.style.fontSize = (18 + Math.floor(Math.random() * 30)) + 'px';
          heart.style.animationDuration = (5 + Math.random() * 10) + 's';
          container.appendChild(heart);
        }
      }

      // =============== سیستەمی تایپینگ ===============
      function stopTyping() {
        if (typingInterval) {
          clearInterval(typingInterval);
          typingInterval = null;
        }
      }

      function resetAndStart() {
        stopTyping();
        specialElement.classList.remove('show');
        textContainer.textContent = '';
        currentIndex = 0;
        animationActive = true;
        cursorSpan.style.display = 'inline-block';
        
        typingInterval = setInterval(typeNextCharacter, 45); // کەمێک خێراتر بۆ نامە درێژەکە
      }

      function typeNextCharacter() {
        if (currentIndex < fullMessage.length) {
          textContainer.textContent += fullMessage.charAt(currentIndex);
          currentIndex++;
        } else {
          stopTyping();
          animationActive = false;
          cursorSpan.style.display = 'none';
          specialElement.classList.add('show');
        }
      }

      // =============== ئیڤێنتەکان ===============
      replayBtn.addEventListener('click', () => {
        stopTyping();
        resetAndStart();
        // دڵنیابوون لەوەی گۆرانییەکە بەردەوامە
        if (youtubePlayer && isPlayerReady) {
          try {
            const state = youtubePlayer.getPlayerState();
            if (state !== 1) {
              youtubePlayer.playVideo();
            }
          } catch(e) {}
        }
      });

      // =============== دەستپێکردنی سەرەتایی ===============
      createHearts();
      resetAndStart();
      
      // دەستپێکردنی خۆکارانەی یوتیوب پلەیەر
      setTimeout(() => {
        loadYouTubeAPI();
      }, 800);

      // پاککردنەوە
      window.addEventListener('beforeunload', () => {
        stopTyping();
        if (playerPlayInterval) clearInterval(playerPlayInterval);
        if (youtubePlayer) {
          try {
            youtubePlayer.destroy();
          } catch(e) {}
        }
      });

      console.log('💖 جەژنت پیرۆز بێت ئاواتی جیان!');
      console.log('🎵 گۆرانی Ahmet Kaya - Karar Vermek Zor بە خۆکاری لێدەدرێت...');

    })();
  </script>
</body>
</html>
