<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جەژنت پیرۆز، ئاوات جیان</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0f1a;
            font-family: 'Rabar', 'Nizar', 'Tahoma', sans-serif;
            overflow-x: hidden;
        }

        /* ئەنیمەیشنی پشتە */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite alternate;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.4);
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.8); }
        }

        .heart-particle {
            position: absolute;
            color: #ff3366;
            font-size: 24px;
            animation: floatUp 6s linear infinite;
            opacity: 0.7;
            text-shadow: 0 0 10px #ff3366;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* کۆنتێنەری سەرەکی */
        .main-container {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            margin: 20px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), 0 0 100px rgba(255, 51, 102, 0.2);
            border: 2px solid rgba(255, 215, 0, 0.5);
            text-align: center;
            animation: glowPulse 3s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
            100% { box-shadow: 0 0 70px rgba(255, 51, 102, 0.6), 0 0 120px rgba(255, 215, 0, 0.4); }
        }

        /* شێوازی دەقی پەیام */
        .message-text {
            color: #f0e6d2;
            font-size: 1.8em;
            line-height: 2.2;
            font-weight: bold;
            margin: 25px 0;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            word-spacing: 4px;
            white-space: pre-wrap;
            text-align: center;
        }

        .letter {
            display: inline-block;
            transition: all 0.3s ease;
            animation: fadeInLetter 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInLetter {
            0% { opacity: 0; transform: translateY(20px); filter: blur(4px); color: #ff9966; }
            50% { color: #ffcc00; text-shadow: 0 0 25px gold; }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); color: #f0e6d2; }
        }

        .letter:hover {
            transform: scale(1.4);
            color: #ff3366;
            text-shadow: 0 0 30px red;
            cursor: default;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.8em;
            background: gold;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* بەشی ناوی دکتۆر */
        .dedication {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            border: 1px dashed gold;
            direction: rtl;
        }

        .doctor-name {
            font-family: 'Nizar', 'Tahoma', sans-serif;
            font-size: 2.2em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px gold, 0 0 40px #ff8c00;
            background: linear-gradient(45deg, gold, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 2s infinite alternate;
        }

        @keyframes shine {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.5); text-shadow: 0 0 40px orange; }
        }

        .player-note {
            color: #aaa;
            font-size: 1em;
            margin: 15px 0;
            font-style: italic;
        }

        .play-btn {
            background: gold;
            color: black;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px gold;
            margin: 10px 0;
        }

        .play-btn:hover {
            background: #ffaa00;
            box-shadow: 0 0 40px orange;
            transform: scale(1.05);
        }

        /* یوتوب بە شێوەیەکی شاراوە */
        #youtube-player {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

<div class="bg-animation">
    <!-- ئەستێرەکان -->
    <div class="stars" id="starsContainer"></div>
    <!-- دڵە ئەنیمەیشنەکان -->
    <div id="heartsContainer"></div>
</div>

<div class="main-container">
    <div id="messageDisplay" class="message-text"></div>
    <div class="cursor" id="cursor"></div>

    <div class="dedication">
        <p style="color:#ccc; margin-bottom:5px;">💖 بۆ تۆ کە شایانی هەموو ڕێزێکی 💖</p>
        <p class="doctor-name">دکتۆرە ئاوات ئەلماسی خاوێن و خاون دلێکی پاک و میهرەبان</p>
    </div>
    <p class="player-note">🎵 بۆ دەستپێکردنی پارچەی گۆرانییەکە، تکایە کرتە بکە: 🎵</p>
    <button class="play-btn" onclick="startMusicAndAnimation()">🎶 دەستپێکردنی گۆرانی و پەیام 🎶</button>
</div>

<!-- YouTube iframe player - خۆکار نییە بۆیە کرتە پێویستە -->
<div id="youtube-player"></div>

<script>
    // ========== دەستپێکردنی گۆرانی لەگەڵ پەیام ==========
    let player;
    let animationStarted = false;

    // ئەم فەنکشنە کاتێک بەکارهێنەر کرتە دەکات کار دەکات
    function startMusicAndAnimation() {
        if (animationStarted) return;
        animationStarted = true;
        
        // لادانی دوگمەکە
        const btn = document.querySelector('.play-btn');
        if(btn) btn.style.display = 'none';
        
        // دروستکردنی پلەیەری یوتوب
        if (!player) {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            
            window.onYouTubeIframeAPIReady = function() {
                player = new YT.Player('youtube-player', {
                    height: '1',
                    width: '1',
                    videoId: 'RPKTPGuij-Q',
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'start': 20,  // لە چرکەی 20 دەست پێدەکات
                        'end': 60,    // لە چرکەی 60 کۆتایی دێت (نزیکەی 40 چرکە)
                        'playsinline': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': onPlayerReady
                    }
                });
            };
        } else {
            player.playVideo();
        }
        
        // دەستپێکردنی ئەنیمەیشنی دەق
        startTextAnimation();
    }

    function onPlayerReady(event) {
        event.target.unMute();
        event.target.playVideo();
    }

    // ========== ئەنیمەیشنی نوسین و دەرکەوتنی پیت بە پیت ==========
    const fullMessage = "چەژنت پیرۆز  ئاوات جیان یارەبی خوای گەورە لۆمنت سەلامەت بکات پشت پەنام هەموو دەمێ لە پشتم بووی خۆشی و ناخۆشی منت بەرێ کردن ئەمنت پێ گەیاند هەتا ئیستا وەک مامۆستا سەیری کەسم نەکردیە بەڵام یەکەم مامۆستای ژیانم ئەتوو بووی فێرە زۆر شتت کردم رەبی خوای گەورە ئاواتی دڵت بینتە دی کەسەکی باشیشت بە نسیب بی فەرۆ هەموو دەمێ لۆتو هەیە قەت قەت لۆ هیچ شتەک دەستبەردارت نابی چەژنت پیرۆز بی هەموو ساڵت جەژن بی کەسەکی گەورەی وەکی توو دەبی فەرشی سۆرم لۆ راخستبا لەوانیە ئەو ژیانە زۆر دەرفەتی نەدابمێ زۆر شت هەیە بکەم لۆت بەڵام بە خوای گەورە کەسەکی لەناو دڵی من چەقیوی پشت پەنام جەژنت پیرۆز جەرگ و دڵی فەرزادی";

    const messageContainer = document.getElementById('messageDisplay');
    const cursorElement = document.getElementById('cursor');

    function startTextAnimation() {
        messageContainer.innerHTML = '';
        let index = 0;
        
        function addLetter() {
            if (index < fullMessage.length) {
                const char = fullMessage[index];
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char;
                span.style.animationDelay = '0s';
                messageContainer.appendChild(span);
                
                // هێنانەوەی ئەنیمەیشن بۆ هەر پیتێک
                span.style.animation = 'none';
                span.offsetHeight; // ڕیستارت
                span.style.animation = 'fadeInLetter 0.8s ease forwards';
                
                index++;
                const speed = Math.random() * 60 + 40; // خێرایی هەڕەمەکی نێوان 40-100 میلی چرکە
                setTimeout(addLetter, speed);
            } else {
                // کاتێک تەواو بوو، کرێسۆرەکە دەمێنێتەوە بەڵام ئارام ئارام
                cursorElement.style.animation = 'blink 2s infinite';
            }
        }
        
        addLetter();
    }

    // ========== دروستکردنی ئەنیمەیشنی پشتە (ئەستێرە و دڵ) ==========
    function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 4 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }

    function createHearts() {
        const container = document.getElementById('heartsContainer');
        const heartSymbols = ['❤️', '✨', '💛', '🌟', '💝', '🕌', '🌙'];
        for (let i = 0; i < 25; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(heart);
        }
    }

    // دەستپێکردنی پشتە لە کاتی بارکردن
    window.onload = function() {
        createStars();
        createHearts();
    };
</script>
</body>
</html>
