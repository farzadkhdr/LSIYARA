<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <title>تەنۆلکەکان - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            font-family: Arial;
            direction: rtl;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>تەنۆلکەکان (Particles)</h3>
        <p>ڕەنگ و قەبارە بەپێی شوێنی تەنۆلکە دەگۆڕێت</p>
    </div>

    <!-- سێرڤەری Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ڕێکخستنی سەرەکی (Scene, Camera, Renderer) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // ئاسمانی تاریک

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- دروستکردنی تەنۆلکەکان ---
        const particleCount = 5000;
        const geometry = new THREE.BufferGeometry();

        // شوێنەکان (positions)
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // تەنۆلکەکان لە ناو گۆیەکدا بڵاو بکەوە
            const radius = 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // ڕەنگەکان (colors) - دەستپێکی ڕەنگی ڕەش
        const colors = new Float32Array(particleCount * 3);
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // قەبارەکان (sizes)
        const sizes = new Float32Array(particleCount);
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // --- فەنکشنی ڕەنگ و قەبارە بەپێی ئیندێکس ---
        function getAttributesForParticle(i) {
            // ڕەنگی پەیوەست بە شوێنی تەنۆلکە: شوێنی X
            const posX = positions[i * 3];
            const posY = positions[i * 3 + 1];
            
            // ڕەنگ: لە شین (0,0,1) بۆ سوور (1,0,0) بەپێی X
            const r = (posX + 3) / 6;    // لە -3 بۆ 3 => لە 0 بۆ 1
            const g = (posY + 3) / 6;
            const b = 1 - r;
            
            // قەبارە: لە 0.05 بۆ 0.3 بەپێی شوێنی Z
            const size = 0.1 + (positions[i * 3 + 2] + 3) / 60;
            
            return {
                color: { r, g, b },
                size: size
            };
        }

        // --- نوێکردنەوەی ڕەنگ و قەبارەکان ---
        function updateParticleAttributes() {
            const pColors = geometry.attributes.color.array;
            const pSizes = geometry.attributes.size.array;

            for (let i = 0; i < particleCount; i++) {
                const { color, size } = getAttributesForParticle(i);
                pColors[i * 3] = color.r;
                pColors[i * 3 + 1] = color.g;
                pColors[i * 3 + 2] = color.b;
                pSizes[i] = size;
            }

            // ئاگادارکردنەوەی Three.js (بە "needsUpdate")
            geometry.attributes.color.needsUpdate = true;
            geometry.attributes.size.needsUpdate = true;
        }

        // بانگکردنی فەنکشن بۆ جاری یەکەم
        updateParticleAttributes();

        // دروستکردنی ماددەی تەنۆلکەکان بۆ نیشاندانی قەبارە
        // Three.js بە شێوەی پێشگر قەبارە بۆ Points نانیشانێت، جا پێویستە شەیدەرێکی تایبەت بەکاربهێنین
        // بەڵام بۆ سادەیی، ئێمە materialێکی ئاسایی بەکاردەهێنین و قەبارە لە شەیدەردا دیاری دەکەین
        
        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * ( 300.0 / ( - mvPosition.z ) ); // قەبارە بەپێی دووری
                gl_PointSize = clamp(gl_PointSize, 5.0, 20.0);
                gl_PointPosition = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                vec2 coord = gl_PointCoord;
                float dist = length(coord - vec2(0.5));
                if (dist > 0.5) discard; // خاڵی بازنەیی
                gl_FragColor = vec4(vColor, 1.0);
            }
        `;
        
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: false,
            depthWrite: true,
            depthTest: true
        });
        
        // بەکارهێنانی Points بە شەیدەری تایبەت
        const particles = new THREE.Points(geometry, shaderMaterial);
        scene.add(particles);

        // زیادکردنی هەندێک ستێرەی پاشبنەما (ئامادەنەکراو)
        // بۆ جوانکاری: چەند تەنۆلکەیەکی تر بە ڕەنگی سپی لە دووردا
        
        // --- ئەنیمەیشن ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            
            // خولانەوەی تەنۆلکەکان بۆ کارلێکی بینایی
            particles.rotation.y = time * 0.2;
            particles.rotation.x = Math.sin(time * 0.3) * 0.2;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // --- ڕێکخستن بۆ گۆڕینی قەبارەی پەنجەرە ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("✅ کۆدەکە بە سەرکەوتوویی کار دەکات!");
    </script>
</body>
</html>
